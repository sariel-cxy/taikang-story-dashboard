<svg width="100%" viewBox="0 0 680 680" role="img" xmlns="http://www.w3.org/2000/svg">
<title>长寿时代总领概念圈图</title>
<desc>同心圆总领概念圈框架，由外到内：长寿时代、创新永续、医养康宁/金融保险（左右半环）、商业向善</desc>
<defs>
  <style>
    .label { font-family: "PingFang SC", "Microsoft YaHei", "Noto Sans CJK SC", "Hiragino Sans GB", sans-serif; }
  </style>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <!-- 左半环裁切：金融保险 -->
  <clipPath id="leftHalf">
    <rect x="0" y="0" width="340" height="680"/>
  </clipPath>
  <!-- 右半环裁切：医养康宁 -->
  <clipPath id="rightHalf">
    <rect x="340" y="0" width="340" height="680"/>
  </clipPath>
</defs>

<!-- 最外圈：长寿时代 · 紫色系 -->
<circle cx="340" cy="340" r="290" fill="#EDE9FB" fill-opacity="0.7" stroke="#7C5CBF" stroke-width="1"/>
<!-- 第二圈：创新永续 · 蓝色系 -->
<circle cx="340" cy="340" r="210" fill="#E3EEF9" fill-opacity="0.8" stroke="#3A7EC8" stroke-width="1"/>

<!-- 第三圈左半：金融保险 · 深青 -->
<circle cx="340" cy="340" r="138" fill="#DDEEF0" fill-opacity="0.95" stroke="#1B6E7A" stroke-width="1" clip-path="url(#leftHalf)"/>
<!-- 第三圈右半：医养康宁 · 绿色系 -->
<circle cx="340" cy="340" r="138" fill="#E4F4EC" fill-opacity="0.95" stroke="#2E8B57" stroke-width="1" clip-path="url(#rightHalf)"/>
<!-- 第三圈分隔虚线（垂直直径） -->
<line x1="340" y1="202" x2="340" y2="478" stroke="#5A6B70" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.55"/>

<!-- 核心圆：商业向善 · 橙色系（盖在分隔线上） -->
<circle cx="340" cy="340" r="72" fill="#FFF0E0" stroke="#E07820" stroke-width="1.2"/>

<!-- 装饰虚线内环 -->
<circle cx="340" cy="340" r="276" fill="none" stroke="#9B7DD4" stroke-width="0.4" stroke-dasharray="4 7" opacity="0.4"/>
<circle cx="340" cy="340" r="195" fill="none" stroke="#5A9FE0" stroke-width="0.4" stroke-dasharray="4 7" opacity="0.4"/>

<!-- 核心标签：商业向善 -->
<rect x="298" y="318" width="84" height="38" rx="19" fill="#E07820"/>
<text x="340" y="341" text-anchor="middle" class="label" font-size="15" font-weight="500" fill="#FFFFFF">商业向善</text>
<text x="340" y="372" text-anchor="middle" class="label" font-size="12" fill="#B35E10">长期主义</text>

<!-- 标签：长寿时代（顶部） -->
<rect x="268" y="33" width="144" height="52" rx="10" fill="#5C3DAA"/>
<text x="340" y="56" text-anchor="middle" class="label" font-size="16" font-weight="500" fill="#FFFFFF">长寿时代</text>
<text x="340" y="75" text-anchor="middle" class="label" font-size="12" fill="#C4ADEE">时代判断</text>
<line x1="340" y1="85" x2="340" y2="52" stroke="#7C5CBF" stroke-width="0.8" stroke-dasharray="3 4" opacity="0.65"/>
<circle cx="340" cy="52" r="2.5" fill="#7C5CBF" opacity="0.75"/>

<!-- 标签：创新永续（右上 2 点钟方向，向内收以避免出最外圈） -->
<rect x="428" y="200" width="160" height="52" rx="10" fill="#1D5FA8"/>
<text x="508" y="223" text-anchor="middle" class="label" font-size="16" font-weight="500" fill="#FFFFFF">创新永续</text>
<text x="508" y="242" text-anchor="middle" class="label" font-size="12" fill="#9EC8F5">集团动能</text>

<!-- 标签：金融保险（左侧，部分落入第三圈，不遮挡核心圆） -->
<rect x="117" y="314" width="148" height="52" rx="10" fill="#1B6E7A"/>
<text x="191" y="337" text-anchor="middle" class="label" font-size="16" font-weight="500" fill="#FFFFFF">金融保险</text>
<text x="191" y="356" text-anchor="middle" class="label" font-size="12" fill="#A8D4DB">价值闭环</text>

<!-- 标签：医养康宁（右下） -->
<rect x="354" y="412" width="148" height="52" rx="10" fill="#1E6B40"/>
<text x="428" y="435" text-anchor="middle" class="label" font-size="16" font-weight="500" fill="#FFFFFF">医养康宁</text>
<text x="428" y="454" text-anchor="middle" class="label" font-size="12" fill="#86D4A8">服务生态</text>

</svg>
